<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Keyword News">
<title>Keyword News</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="style.css?v=rss-20260525-7">
</head>
<body>

<!-- ── Auth Overlay ── -->
<div id="authOverlay">
  <div class="auth-box">
    <div class="auth-logo">Keyword<span>News</span></div>
    <div class="auth-tagline">모든 뉴스를 한 곳에서 모니터링하세요</div>

    <div id="authLogin">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="loginEmail" placeholder="name@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password">
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn-primary full" onclick="doLogin()">로그인</button>
      <div class="auth-divider">또는</div>
      <button class="btn-secondary full" onclick="switchAuth('signup')">회원가입</button>
      <button class="btn-ghost full" onclick="doGuest()">게스트로 시작</button>
    </div>

    <div id="authSignup" style="display:none">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="signupName" placeholder="홍길동">
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" id="signupEmail" placeholder="name@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="signupPw" placeholder="8자 이상" autocomplete="new-password">
      </div>
      <div class="form-error" id="signupError"></div>
      <button class="btn-primary full" onclick="doSignup()">가입하기</button>
      <div class="auth-divider"></div>
      <button class="btn-ghost full" onclick="switchAuth('login')">← 로그인으로 돌아가기</button>
    </div>
  </div>
</div>

<!-- ── App Shell ── -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-top">
      <div class="app-brand">
        <span class="brand-logo">KN</span>
        <span class="brand-name">Keyword<b>News</b></span>
      </div>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="테마 전환" aria-label="테마 전환">
          <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button class="icon-btn" onclick="openSettings()" title="설정" aria-label="설정">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2"/><circle cx="15" cy="17" r="2"/></svg>
        </button>
      </div>
    </div>

    <div class="section-label">키워드</div>
    <div id="keywordList" class="keyword-list"></div>

    <div class="sidebar-footer">
      <div class="add-row">
        <input id="newKwInput" class="kw-input" placeholder="키워드 추가..." maxlength="20" onkeydown="if(event.key==='Enter')addKeyword()">
        <button class="add-btn" onclick="addKeyword()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>
      <div class="user-row" onclick="openSettings()">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="userName">사용자</div>
          <div class="user-email" id="userEmail">설정</div>
        </div>
        <button class="icon-btn sm" onclick="event.stopPropagation();doLogout()" title="로그아웃" aria-label="로그아웃">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="mainEmpty" class="main-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <p>왼쪽에서 키워드를 선택하세요</p>
    </div>

    <div id="mainContent" style="display:none">
      <div class="main-header">
        <div class="header-left">
          <button class="icon-btn" id="sidebarToggle" onclick="toggleSidebar()" aria-label="사이드바 열기/닫기">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="active-keyword-badge" id="activeKwBadge"></div>
          <span class="news-count" id="newsCountLabel"></span>
        </div>
        <div class="header-right">
          <button class="hdr-btn" id="recommendBtn" onclick="showRecommendations()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.6 5.3 5.8.8-4.2 4.1 1 5.8-5.2-2.7L6.8 19l1-5.8-4.2-4.1 5.8-.8L12 3z"/></svg>
            추천 기사
          </button>
          <button class="hdr-btn" onclick="markAllRead()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            모두 읽음
          </button>
          <button class="hdr-btn" onclick="refreshNews()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            새로고침
          </button>
        </div>
      </div>

      <div id="loadingBar" class="loading-bar" style="display:none"></div>

      <div id="apiWarning" class="api-warning" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span>RSS 프록시 서버에 연결하지 못해 샘플 데이터를 표시합니다. 서버를 실행한 뒤 같은 PC는 <b>localhost:3001</b>, 다른 PC는 <b>서버IP:3001</b>로 접속하세요.</span>
      </div>

      <div id="newsList" class="news-list"></div>
    </div>
  </main>
</div>

<!-- ── Settings Modal ── -->
<div id="settingsModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeSettings()">
  <div class="modal-box">
    <div class="modal-header">
      <span>설정</span>
      <button class="icon-btn" onclick="closeSettings()" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <div class="settings-label">제외 키워드</div>
        <div class="settings-desc">한 줄에 하나씩 입력하세요. 해당 단어가 제목이나 요약에 포함된 기사는 결과에서 제외됩니다.</div>
        <div class="form-group mt8">
          <label>제외할 단어</label>
          <textarea id="excludedKeywords" class="settings-textarea" placeholder="예: 광고&#10;스포츠&#10;부고"></textarea>
        </div>
        <button class="btn-primary" onclick="saveExcludedKeywords()">제외 키워드 저장</button>
      </div>

      <div class="settings-section">
        <div class="settings-label">계정 정보</div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="settingsName" placeholder="이름">
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="settingsEmail" placeholder="이메일" readonly style="opacity:0.6">
        </div>
        <button class="btn-secondary" onclick="saveProfile()">프로필 저장</button>
      </div>

      <div class="settings-section">
        <div class="settings-label">스크랩한 기사</div>
        <div id="scrappedList" class="scrapped-list"></div>
      </div>

      <div class="settings-section danger">
        <div class="settings-label" style="color:var(--red)">계정 관리</div>
        <button class="btn-danger" onclick="doLogout()">로그아웃</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Share Modal ── -->
<div id="shareModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeShareModal()">
  <div class="modal-box sm">
    <div class="modal-header">
      <span>공유하기</span>
      <button class="icon-btn" onclick="closeShareModal()" aria-label="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="share-title" id="shareTitle"></div>
      <div class="share-options">
        <button class="share-opt" onclick="shareVia('copy')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          링크 복사
        </button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js?v=rss-20260525-7"></script>
</body>
</html>
